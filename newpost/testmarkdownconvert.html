<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Markdown to HTML Converter</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        textarea { width: 100%; height: 150px; }
        #output { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<h2>Markdown to HTML Converter</h2>

<textarea id="markdownInput" placeholder="Type Markdown here..."># Hello World
This is **bold** text and this is *italic* text.
- Item 1
- Item 2
</textarea>

<div id="output"></div>

<!-- Load Showdown from CDN -->
<script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
<script>
    // Create a Showdown converter instance
    const converter = new showdown.Converter();

    const input = document.getElementById('markdownInput');
    const output = document.getElementById('output');

    // Function to convert Markdown to HTML
    function convertMarkdown() {
        try {
            const markdownText = input.value;
            const html = converter.makeHtml(markdownText);
            output.innerHTML = html;
        } catch (error) {
            output.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
        }
    }

    // Convert on input change
    input.addEventListener('input', convertMarkdown);

    // Initial conversion
    convertMarkdown();
</script>

</body>
</html>
