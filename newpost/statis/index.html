<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a new Post</title>
    <link rel="stylesheet" href="newpost.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <!-- <img id="preview" style="max-width:200px; display:none;"> -->
        <input type="file" id="upload" accept="image/png, image/jpeg, image/webp">
        <label for="upload" class="empty" id="uploadBox">
            <span id="uploadText">Upload Thumbnail</span>
            <img id="preview" hidden>
        </label>
        <div id="inputs">
            <input placeholder="Title" class="txt" id="title"></input>
            <textarea class="txt" id="input"></textarea>
        </div>
        <h1 id="prev">Preview
        <div id="output"></div></h1>
        <button class="create" id="create">Create</button>
        <button class="create" id="create_plus">Create & Publish</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
